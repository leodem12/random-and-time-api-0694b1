# Generated by the Godel autonomous SDLC pipeline.
stages:
  - build
  - test

variables:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

backend:build-test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet test --nologo --verbosity minimal

frontend:build:
  stage: build
  image: node:20
  rules:
    - exists:
        - "**/angular.json"
  script:
    - cd "$(dirname "$(find . -name angular.json -not -path '*/node_modules/*' | head -n1)")"
    - npm ci --legacy-peer-deps || npm install --legacy-peer-deps
    - npx ng build --configuration=production
